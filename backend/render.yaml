services:
  - type: web
    name: prep4future-api
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
